 <!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台股籌碼 Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f0f17;color:#e0e0e0;min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#1e1e2e;border-bottom:1px solid #2a2a3e}
.top-bar h1{font-size:16px;font-weight:600;color:#fff}
.top-bar .time{font-size:11px;color:#888}
.stock-bar{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:#1e1e2e;border-bottom:1px solid #2a2a3e;scrollbar-width:none}
.stock-bar::-webkit-scrollbar{display:none}
.stock-btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #3a3a5e;background:transparent;color:#aaa;white-space:nowrap;flex-shrink:0;transition:all 0.2s}
.stock-btn.active{background:#4fc3f7;color:#0f0f17;border-color:#4fc3f7;font-weight:600}
.tabs{display:flex;background:#1e1e2e;border-bottom:1px solid #2a2a3e;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:#4fc3f7;border-bottom-color:#4fc3f7;font-weight:500}
.section{padding:14px 16px;display:none}
.section.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.metric{background:#1e1e2e;border-radius:10px;padding:12px 14px;border:1px solid #2a2a3e}
.metric .lbl{font-size:11px;color:#888;margin-bottom:6px}
.metric .val{font-size:20px;font-weight:600}
.up{color:#4caf7d}
.dn{color:#ef5350}
.neu{color:#e0e0e0}
.section-title{font-size:12px;font-weight:500;color:#888;margin:14px 0 8px;text-transform:uppercase;letter-spacing:0.5px}
.chart-wrap{position:relative;width:100%;background:#1e1e2e;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #2a2a3e}
.signal-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.signal{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.signal.bull{background:rgba(76,175,125,0.15);border:1px solid rgba(76,175,125,0.4);color:#4caf7d}
.signal.bear{background:rgba(239,83,80,0.15);border:1px solid rgba(239,83,80,0.4);color:#ef5350}
.signal.warn{background:rgba(255,183,77,0.15);border:1px solid rgba(255,183,77,0.4);color:#ffb74d}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px}
.legend span{display:flex;align-items:center;gap:5px;font-size:12px;color:#888}
.legend i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.date-badge{display:inline-block;background:#2a2a3e;border-radius:6px;padding:4px 10px;font-size:11px;color:#888;margin-bottom:12px}
.loading{text-align:center;padding:40px 16px;color:#888;font-size:14px}
.loading .spinner{width:32px;height:32px;border:3px solid #2a2a3e;border-top-color:#4fc3f7;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(239,83,80,0.1);border:1px solid rgba(239,83,80,0.3);border-radius:8px;padding:12px 14px;font-size:13px;color:#ef5350;margin-bottom:12px}
.refresh-btn{width:100%;padding:12px;background:transparent;border:1px solid #3a3a5e;border-radius:8px;color:#4fc3f7;font-size:14px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>

<div class="top-bar">
  <h1>台股籌碼 Dashboard</h1>
  <span class="time" id="nowTime"></span>
</div>

<div class="stock-bar" id="stockBar"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">籌碼</div>
  <div class="tab" onclick="switchTab(1)">K棒</div>
  <div class="tab" onclick="switchTab(2)">融資券</div>
  <div class="tab" onclick="switchTab(3)">歷史趨勢</div>
</div>

<div class="section active" id="sec0">
  <div id="content0"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>
<div class="section" id="sec1">
  <div id="content1"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>
<div class="section" id="sec2">
  <div id="content2"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>
<div class="section" id="sec3">
  <div id="content3"><div class="loading"><div class="spinner"></div>載入中...</div></div>
</div>

<script>
const WATCH_LIST = [
  {id:"2330",name:"台積電"},
  {id:"2317",name:"鴻海"},
  {id:"2454",name:"聯發科"},
  {id:"0050",name:"元大50"},
];

let curStock = "2330";
let curTab   = 0;
let chipCache    = {};
let histCache    = {};
let charts   = {};

function updateTime(){
  const tw = new Date(Date.now() + 8*3600000);
  document.getElementById("nowTime").textContent =
    tw.toISOString().slice(0,10) + " " + tw.toISOString().slice(11,16) + " CST";
}
setInterval(updateTime, 1000);
updateTime();

function buildStockBar(){
  document.getElementById("stockBar").innerHTML =
    WATCH_LIST.map(s =>
      `<button class="stock-btn${s.id===curStock?" active":""}"
        onclick="selectStock('${s.id}')">${s.id} ${s.name}</button>`
    ).join("");
}

function selectStock(id){
  curStock = id;
  buildStockBar();
  renderTab(curTab);
}

function switchTab(i){
  curTab = i;
  document.querySelectorAll(".tab").forEach((t,j)=>t.classList.toggle("active",j===i));
  document.querySelectorAll(".section").forEach((s,j)=>s.classList.toggle("active",j===i));
  renderTab(i);
}

async function fetchChip(stock){
  if(chipCache[stock]) return chipCache[stock];
  const res  = await fetch(`/api/chips?stock=${stock}`);
  const data = await res.json();
  chipCache[stock] = data;
  setTimeout(()=>{ delete chipCache[stock]; }, 5*60*1000);
  return data;
}

async function fetchHistory(stock){
  if(histCache[stock]) return histCache[stock];
  const res  = await fetch(`/api/history?stock=${stock}&months=2`);
  const data = await res.json();
  histCache[stock] = data.history || [];
  setTimeout(()=>{ delete histCache[stock]; }, 5*60*1000);
  return histCache[stock];
}

function fmt(v){ return (v>=0?"+":"")+Number(v).toLocaleString(); }
function fmtK(v){ return Math.abs(v)>=1000?(v/1000).toFixed(1)+"K":Number(v).toFixed(0); }

function destroyChart(id){
  if(charts[id]){ charts[id].destroy(); delete charts[id]; }
}

async function renderTab(tab){
  const el = document.getElementById("content"+tab);
  el.innerHTML = `<div class="loading"><div class="spinner"></div>載入中...</div>`;

  try {
    if(tab===0){
      const data = await fetchChip(curStock);
      renderChip(el, data);
    }
    else if(tab===1){
      const hist = await fetchHistory(curStock);
      renderKBar(el, hist);
    }
    else if(tab===2){
      const data = await fetchChip(curStock);
      renderMargin(el, data);
    }
    else if(tab===3){
      const [data, hist] = await Promise.all([
        fetchChip(curStock),
        fetchHistory(curStock)
      ]);
      renderHistory(el, data, hist);
    }
  } catch(e) {
    el.innerHTML = `<div class="error-msg">資料載入失敗：${e.message}</div>
      <button class="refresh-btn" onclick="chipCache={}; histCache={}; renderTab(${tab})">重新載入</button>`;
  }
}

function renderChip(el, d){
  const inst = d.inst || {};
  const sigs = d.signals || [];
  el.innerHTML = `
    <div class="date-badge">資料日期：${d.date} ｜ ${d.update_time}</div>
    <div class="metrics">
      <div class="metric"><div class="lbl">外資買賣超</div>
        <div class="val ${inst.foreign>=0?"up":"dn"}">${fmt(inst.foreign)}</div></div>
      <div class="metric"><div class="lbl">投信買賣超</div>
        <div class="val ${inst.trust>=0?"up":"dn"}">${fmt(inst.trust)}</div></div>
      <div class="metric"><div class="lbl">自營買賣超</div>
        <div class="val ${inst.dealer>=0?"up":"dn"}">${fmt(inst.dealer)}</div></div>
      <div class="metric"><div class="lbl">三大法人合計</div>
        <div class="val ${inst.total>=0?"up":"dn"}">${fmt(inst.total)}</div></div>
    </div>
    <div class="section-title">訊號解讀</div>
    <div class="signal-list">
      ${sigs.map(s=>`<div class="signal ${s.type}">${s.text}</div>`).join("")}
    </div>
    <div class="section-title">三大法人買賣超（張）</div>
    <div class="legend">
      <span><i style="background:#4fc3f7"></i>外資</span>
      <span><i style="background:#ffb74d"></i>投信</span>
      <span><i style="background:#ce93d8"></i>自營</span>
    </div>
    <div class="chart-wrap" style="height:200px">
      <canvas id="instChart"></canvas>
    </div>`;

  destroyChart("inst");
  charts["inst"] = new Chart(document.getElementById("instChart"),{
    type:"bar",
    data:{
      labels:["外資","投信","自營"],
      datasets:[{
        data:[inst.foreign, inst.trust, inst.dealer],
        backgroundColor:["#4fc3f7","#ffb74d","#ce93d8"],
        borderRadius:4
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${fmt(ctx.raw)} 張`}}},
      scales:{
        x:{ticks:{color:"#888",font:{size:13}},grid:{display:false}},
        y:{ticks:{color:"#888",font:{size:11},callback:v=>fmtK(v)},
          grid:{color:"rgba(255,255,255,0.06)"}}
      }}
  });
}

function renderKBar(el, p){
  p = (p||[]).slice(-30);
  if(!p.length){
    el.innerHTML=`<div class="error-msg">無歷史價格資料</div>`; return;
  }
  el.innerHTML = `
    <div class="section-title">股價走勢（近30日）</div>
    <div class="chart-wrap" style="height:250px">
      <canvas id="kChart"></canvas>
    </div>
    <div class="section-title">成交量（張）</div>
    <div class="chart-wrap" style="height:120px">
      <canvas id="volChart"></canvas>
    </div>`;

  destroyChart("k"); destroyChart("vol");
  const labels   = p.map(r=>r.date.slice(5));
  const upColor  = "rgba(76,175,125,0.85)";
  const dnColor  = "rgba(239,83,80,0.85)";
  const upColorT = "rgba(76,175,125,0.35)";
  const dnColorT = "rgba(239,83,80,0.35)";

  charts["k"] = new Chart(document.getElementById("kChart"),{
    type:"bar",
    data:{labels,datasets:[
      {label:"高低",data:p.map(r=>[r.low,r.high]),
        backgroundColor:p.map(r=>r.close>=r.open?upColorT:dnColorT),
        barPercentage:0.2,borderRadius:0},
      {label:"開收",data:p.map(r=>[Math.min(r.open,r.close),Math.max(r.open,r.close)]),
        backgroundColor:p.map(r=>r.close>=r.open?upColor:dnColor),
        barPercentage:0.7,borderRadius:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{
          title:ctx=>p[ctx[0].dataIndex].date,
          label:ctx=>{
            const r=p[ctx.dataIndex];
            return `開${r.open} 高${r.high} 低${r.low} 收${r.close}`;
          }
        }}},
      scales:{
        x:{ticks:{color:"#888",font:{size:10},maxRotation:45,autoSkip:true},grid:{display:false}},
        y:{ticks:{color:"#888",font:{size:11}},grid:{color:"rgba(255,255,255,0.06)"}}
      }}
  });

  charts["vol"] = new Chart(document.getElementById("volChart"),{
    type:"bar",
    data:{labels,datasets:[{
      data:p.map(r=>r.vol),
      backgroundColor:p.map(r=>r.close>=r.open?"rgba(76,175,125,0.6)":"rgba(239,83,80,0.6)"),
      borderRadius:2
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.raw.toLocaleString()} 張`}}},
      scales:{
        x:{ticks:{color:"#888",font:{size:10},maxRotation:45,autoSkip:true},grid:{display:false}},
        y:{ticks:{color:"#888",font:{size:11},callback:v=>fmtK(v)},
          grid:{color:"rgba(255,255,255,0.06)"}}
      }}
  });
}

function renderMargin(el, d){
  const m = d.margin || {};
  const ratio = m.ratio || 0;
  el.innerHTML = `
    <div class="date-badge">資料日期：${d.date} ｜ ${d.update_time}</div>
    <div class="metrics">
      <div class="metric"><div class="lbl">融資餘額（千股）</div>
        <div class="val neu">${Number(m.loan_bal||0).toLocaleString()}</div></div>
      <div class="metric"><div class="lbl">融券餘額（千股）</div>
        <div class="val neu">${Number(m.short_bal||0).toLocaleString()}</div></div>
      <div class="metric"><div class="lbl">融券張數</div>
        <div class="val neu">${Number(m.short_sell||0).toLocaleString()}</div></div>
      <div class="metric"><div class="lbl">券資比</div>
        <div class="val ${ratio>25?"dn":ratio<5?"up":"neu"}">${ratio}%</div></div>
    </div>
    <div class="section-title">券資比解讀</div>
    <div class="signal-list">
      ${ratio>25
        ? `<div class="signal warn">券資比 ${ratio}%，空頭偏重，留意軋空機會</div>`
        : ratio<5
        ? `<div class="signal bull">券資比 ${ratio}%，空頭稀少，市場偏多</div>`
        : `<div class="signal warn">券資比 ${ratio}%，中性區間</div>`
      }
    </div>`;
}

function renderHistory(el, d, hist){
  if(!hist||!hist.length){
    el.innerHTML=`<div class="error-msg">無歷史資料</div>`; return;
  }
  const inst  = d.inst || {};
  const days  = Math.min(hist.length, 30);
  const dates = hist.slice(-days).map(r=>r.date.slice(5));
  const close = hist.slice(-days).map(r=>r.close);

  el.innerHTML = `
    <div class="date-badge">資料日期：${d.date} ｜ ${d.update_time}</div>
    <div class="section-title">收盤價走勢（近${days}日）</div>
    <div class="chart-wrap" style="height:200px">
      <canvas id="priceHistChart"></canvas>
    </div>
    <div class="section-title">今日法人明細</div>
    <div class="metrics">
      <div class="metric"><div class="lbl">外資</div>
        <div class="val ${inst.foreign>=0?"up":"dn"}">${fmt(inst.foreign)} 張</div></div>
      <div class="metric"><div class="lbl">投信</div>
        <div class="val ${inst.trust>=0?"up":"dn"}">${fmt(inst.trust)} 張</div></div>
      <div class="metric"><div class="lbl">自營</div>
        <div class="val ${inst.dealer>=0?"up":"dn"}">${fmt(inst.dealer)} 張</div></div>
      <div class="metric"><div class="lbl">合計</div>
        <div class="val ${inst.total>=0?"up":"dn"}">${fmt(inst.total)} 張</div></div>
    </div>`;

  destroyChart("priceHist");
  charts["priceHist"] = new Chart(document.getElementById("priceHistChart"),{
    type:"line",
    data:{labels:dates,datasets:[{
      label:"收盤價",data:close,
      borderColor:"#4fc3f7",
      backgroundColor:"rgba(79,195,247,0.08)",
      tension:0.3,pointRadius:3,fill:true
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.raw.toLocaleString()} 元`}}},
      scales:{
        x:{ticks:{color:"#888",font:{size:10},maxRotation:45,autoSkip:true},grid:{display:false}},
        y:{ticks:{color:"#888",font:{size:11},callback:v=>v.toLocaleString()},
          grid:{color:"rgba(255,255,255,0.06)"}}
      }}
  });
}

buildStockBar();
renderTab(0);
</script>
</body>
</html>
